name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We welcome ideas that make the HRMS more useful for real teams. MIT-licensed — contributions via PR are encouraged.

  - type: dropdown
    id: module
    attributes:
      label: Area
      options:
        - Authentication
        - Attendance
        - Payroll
        - Leave tracker
        - Recruitment
        - API / Integrations
        - Docker / DevOps
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the problem clearly. Ex. "Our HR team cannot export attendance as CSV..."
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: Add an export button on the attendance register that downloads CSV for the selected month...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: We considered using the Django admin export but...

  - type: checkboxes
    id: willing_to_contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
        - label: I can write pytest-django tests for this feature

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or screenshots
