name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.7, 3.8, 3.9]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          python manage.py test
     
      # - name: Debug
      #   run: |
      #     cat ~/.ssh/known_hosts
      #     ls -l ~/.ssh

      # Deployment steps
      - name: Deploy to AWS EC2
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key.pem
          chmod 600 deploy_key.pem
          ssh -o StrictHostKeyChecking=no -i deploy_key.pem ubuntu@ec2-3-110-118-236.ap-south-1.compute.amazonaws.com "git clone https://github.com/seven7dyne/sevendyne_hrms.git ~/sevendyne_hrms && cd ~/sevendyne_hrms && git pull && python manage.py makemigrations && python manage.py migrate && python manage.py loaddata states countries && python manage.py create_groups_and_permissions && python manage.py createsuperuser && systemctl restart your-app-service"
          rm deploy_key.pem
