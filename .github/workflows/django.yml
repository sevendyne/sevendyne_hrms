name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.7, 3.8, 3.9]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          python manage.py test

      # Deployment steps
      - name: Deploy to AWS EC2
        run: |
          ssh -i ${{ secrets.SSH_PRIVATE_KEY }} ec2-user@3.110.118.236 "git clone https://github.com/seven7dyne/sevendyne_hrms.git ~/sevendyne_hrms && cd ~/sevendyne_hrms && git pull && python manage.py makemigrations && python manage.py migrate && python manage.py loaddata states countries && python manage.py create_groups_and_permissions && python manage.py createsuperuser && systemctl restart your-app-service"
      
