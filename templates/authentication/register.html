<!DOCTYPE html>

{% load static %}
<html lang="en" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg" data-sidebar-image="none">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Smarthr - Bootstrap Admin Template">
		<meta name="keywords" content="admin, estimates, bootstrap, business, corporate, creative, management, minimal, modern, accounts, invoice, html5, responsive, CRM, Projects">
        <meta name="author" content="Dreamguys - Bootstrap Admin Template">
        <title>Register - HRMS admin template</title>
		
		<!-- Favicon -->
        {% comment %} <link rel="shortcut icon" type="image/x-icon" href="{% static 'assets/img/logo_svd.png' %}"> {% endcomment %}
		
		<!-- Bootstrap CSS -->
        <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">

		<!-- Bootstrap CSS -->
        <link rel="stylesheet" href="assets/css/bootstrap.min.css">
		
		<!-- Main CSS -->
        <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

		 
    </head>
    <body class="account-page">
	
		<!-- Main Wrapper -->
        <div class="main-wrapper">
			<div class="account-content">
				<div class="container">
				
					<!-- Account Logo -->
					{% comment %} <div class="account-logo">
						<a href="admin-dashboard.html"><img src="assets/img/logo2.png" alt="Dreamguy's Technologies"></a>
					</div> {% endcomment %}
					<!-- /Account Logo -->
					
					<div class="account-box">
						<div class="account-wrapper">
							<h3 class="account-title">Register</h3>
							<p class="account-subtitle">Access to our dashboard</p>
							
							<!-- Account Form -->
							<form action="" method="post">
								{% csrf_token %}
								<div class="input-block mb-4">
									<label for="email" class="col-form-label">Email<span class="mandatory">*</span></label>
									<input class="form-control" type="email" id="email" name="email" required>
								</div>
								<div class="input-block mb-4">
									<label for="username" class="col-form-label">Username<span class="mandatory">*</span></label>
									<input class="form-control" type="text" id="username" name="username" required>
								</div>
								{% for message in messages %}
									<p style="color:#ff512f">{{message}}</p>
								{% endfor %}
								<div class="input-block mb-4">
									<label for="password" class="col-form-label">Password<span class="mandatory">*</span></label>
									<input class="form-control" type="password" id="password" name="password" required>
								</div>
								<div class="input-block mb-4">
									<label for="first_name" class="col-form-label">First Name<span class="mandatory">*</span></label>
									<input class="form-control" type="text" id="first_name" name="first_name" required>
								</div>
								<div class="input-block mb-4">
									<label for="last_name" class="col-form-label">Last Name<span class="mandatory">*</span></label>
									<input class="form-control" type="text" id="last_name" name="last_name" required>
								</div>
								{% comment %} <div class="input-block mb-4">
									<label for="confirm-password" class="col-form-label">Confirm Password<span class="mandatory">*</span></label>
									<input class="form-control" type="password" id="confirm-password" name="confirm-password" required>
								</div> {% endcomment %}
								<div class="input-block mb-4 text-center">
									<button class="btn btn-primary account-btn" type="submit" value="Register">Register</button>
								</div>
								<div class="account-footer">
									<p>Already have an account? <a href="{% url 'user:user_login' %}">Login</a></p>
								</div>
							</form>
							<!-- /Account Form -->
						</div>
					</div>
				</div>
			</div>
        </div>
		<!-- /Main Wrapper -->

		<!-- jQuery -->
		<script src="{% static 'assets/js/jquery-3.7.1.min.js' %}"></script>
		
		<!-- Bootstrap Core JS -->
        <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
		
		<!-- Custom JS -->
		<script src="{% static 'assets/js/app.js' %}"></script>
		
    </body>
</html>
