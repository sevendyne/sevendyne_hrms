{%load static %}
<!DOCTYPE html>
<html lang="en" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg" data-sidebar-image="none">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Smarthr - Bootstrap Admin Template">
		<meta name="keywords" content="admin, estimates, bootstrap, business, corporate, creative, management, minimal, modern, accounts, invoice, html5, responsive, CRM, Projects">
        <meta name="author" content="Dreamguys - Bootstrap Admin Template">
        <title>Theme Settings - HRMS admin template</title>
		
		<!-- Favicon -->
        <link rel="shortcut icon" type="image/x-icon" href="{%static 'hrms/assets/img/favicon.png'%}">
		
		<!-- Bootstrap CSS -->
        <link rel="stylesheet" href="{%static 'hrms/assets/css/bootstrap.min.css'%}">

		<!-- Fontawesome CSS -->
        <link rel="stylesheet" href="{%static 'hrms/assets/plugins/fontawesome/css/fontawesome.min.css'%}">
    	<link rel="stylesheet" href="{%static 'hrms/assets/plugins/fontawesome/css/all.min.css'%}">

		<!-- Lineawesome CSS -->
        <link rel="stylesheet" href="{%static 'hrms/assets/css/line-awesome.min.css'%}">
		<link rel="stylesheet" href="{%static 'hrms/assets/css/material.css'%}">
		
		<!-- Main CSS -->
        <link rel="stylesheet" href="{%static 'hrms/assets/css/style.css'%}">
		
		 
    </head>
    <body>
		<!-- Main Wrapper -->
        <div class="main-wrapper">
		
			
			<!-- Page Wrapper -->
            <div class="page-wrapper">
			
				<!-- Page Content -->
                <div class="content container-fluid">
					<div class="row">
						<div class="col-md-8 offset-md-2">
						
							<!-- Page Header -->
							<div class="page-header">
								<div class="row">
									<div class="col-sm-12">
										<h3 class="page-title">Theme Settings</h3>
									</div>
								</div>
							</div>
							<!-- /Page Header -->
						
							<form>
								<div class="input-block mb-3 row">
									<label class="col-lg-3 col-form-label">Website Name</label>
									<div class="col-lg-9">
										<input name="website_name" class="form-control" value="Dreamguy's Technologies" type="text">
									</div>
								</div>
								<div class="input-block mb-3 row">
									<label class="col-lg-3 col-form-label">Light Logo</label>
									<div class="col-lg-7">
										<input type="file" class="form-control">
										<span class="form-text text-muted">Recommended image size is 40px x 40px</span>
									</div>
									<div class="col-lg-2">
										<div class="img-thumbnail float-end"><img src="{%static 'hrms/assets/img/logo2.png'%}" alt="Logo" width="40" height="40"></div>
									</div>
								</div>
								<div class="input-block mb-3 row">
									<label class="col-lg-3 col-form-label">Favicon</label>
									<div class="col-lg-7">
										<input type="file" class="form-control">
										<span class="form-text text-muted">Recommended image size is 16px x 16px</span>
									</div>
									<div class="col-lg-2">
										<div class="settings-image img-thumbnail float-end"><img src="{%static 'hrms/assets/img/logo2.png'%}" class="img-fluid" width="16" height="16" alt="Logo"></div>
									</div>
								</div>
								<div class="submit-section">
									<button class="btn btn-primary submit-btn">Save</button>
								</div>
							</form>
						</div>
					</div>
                </div>
				<!-- /Page Content -->
				
            </div>
			<!-- /Page Wrapper -->

        </div>
		<!-- /Main Wrapper -->

		

		<!-- jQuery -->
       <script src="{%static 'hrms/assets/js/jquery-3.7.1.min.js'%}"></script>

		<!-- Bootstrap Core JS -->
        <script src="{%static 'hrms/assets/js/bootstrap.bundle.min.js'%}"></script>

		<!-- Slimscroll JS -->
		<script src="{%static 'hrms/assets/js/jquery.slimscroll.min.js'%}"></script>

		 <!-- Theme Settings JS -->
		<script src="{%static 'hrms/assets/js/layout.js'%}"></script>
		<script src="{%static 'hrms/assets/js/theme-settings.js'%}"></script>
		<script src="{%static 'hrms/assets/js/greedynav.js'%}"></script>
		<!-- Custom JS -->
		<script src="{%static 'hrms/assets/js/app.js'%}"></script>
		
    </body>
</html>
